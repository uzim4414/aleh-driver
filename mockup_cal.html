<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יומן תורים מוסך — Fleet Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f2942;
  --navy-light:#1a3a5c;
  --accent:#3b82f6;
  --accent-light:#60a5fa;
  --bg:#f0f4f8;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#0f172a;
  --text-muted:#64748b;
  --green:#16a34a;
  --green-light:#dcfce7;
  --amber:#d97706;
  --amber-light:#fef3c7;
  --red:#dc2626;
  --red-light:#fee2e2;
  --shadow:0 4px 24px rgba(15,41,66,0.12);
  --shadow-lg:0 8px 40px rgba(15,41,66,0.18);
  --radius:12px;
  --radius-lg:16px;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  font-size:14px;
  line-height:1.5;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
svg{display:block;}

/* ============ ANIMATIONS ============ */
@keyframes slideInUp{
  from{transform:translateY(20px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
@keyframes modalIn{
  from{transform:scale(0.94) translateY(10px);opacity:0;}
  to{transform:scale(1) translateY(0);opacity:1;}
}
@keyframes pillPop{
  0%{transform:scale(0.9);}
  60%{transform:scale(1.05);}
  100%{transform:scale(1);}
}
@keyframes shimmer{
  0%,100%{background-position:200% 0;}
  50%{background-position:-200% 0;}
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
  }
}

/* ============ APP SHELL ============ */
.app{
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* ============ HEADER BAR ============ */
.header{
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:14px 24px;
  display:flex;
  align-items:center;
  gap:18px;
  flex-wrap:wrap;
  box-shadow:0 1px 3px rgba(15,41,66,0.06);
  position:sticky;
  top:0;
  z-index:30;
}
.header-brand{
  display:flex;
  align-items:center;
  gap:11px;
}
.header-icon{
  width:42px;height:42px;
  border-radius:11px;
  background:linear-gradient(135deg,var(--navy),var(--navy-light));
  display:flex;align-items:center;justify-content:center;
  color:#fff;
  flex-shrink:0;
  box-shadow:0 4px 12px rgba(15,41,66,0.25);
}
.header-title{
  font-size:18px;
  font-weight:800;
  color:var(--navy);
  letter-spacing:-0.01em;
}
.header-sub{
  font-size:12px;
  color:var(--text-muted);
  font-weight:500;
}
.header-month-nav{
  display:flex;
  align-items:center;
  gap:6px;
}
.month-label{
  font-size:20px;
  font-weight:800;
  color:var(--text);
  min-width:140px;
  text-align:center;
  letter-spacing:-0.02em;
}
.nav-btn{
  width:44px;height:44px;
  border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);
  transition:all .2s ease-out;
}
.nav-btn:hover{
  background:var(--bg);
  color:var(--accent);
  transform:translateY(-1px);
}
.nav-btn:active{transform:translateY(0);}

.btn-today{
  height:44px;
  padding:0 18px;
  border-radius:11px;
  background:rgba(59,130,246,0.1);
  color:var(--accent);
  font-weight:700;
  font-size:13px;
  transition:all .2s ease-out;
}
.btn-today:hover{
  background:var(--accent);
  color:#fff;
  box-shadow:0 4px 14px rgba(59,130,246,0.35);
}

.header-spacer{flex:1;}

/* Segmented control */
.segmented{
  display:flex;
  background:var(--bg);
  border-radius:11px;
  padding:4px;
  gap:2px;
}
.seg-btn{
  height:36px;
  padding:0 16px;
  border-radius:8px;
  font-size:13px;
  font-weight:600;
  color:var(--text-muted);
  transition:all .2s ease-out;
}
.seg-btn.active{
  background:var(--card);
  color:var(--navy);
  box-shadow:0 2px 8px rgba(15,41,66,0.12);
}
.seg-btn:not(.active):hover{color:var(--text);}

.btn-filter{
  width:44px;height:44px;
  border-radius:11px;
  border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);
  position:relative;
  transition:all .2s ease-out;
}
.btn-filter:hover{border-color:var(--accent);color:var(--accent);}
.btn-filter.active{
  border-color:var(--accent);
  background:rgba(59,130,246,0.08);
  color:var(--accent);
}
.btn-filter.active::after{
  content:'';
  position:absolute;
  top:7px;left:7px;
  width:8px;height:8px;
  border-radius:50%;
  background:var(--accent);
  border:2px solid var(--card);
}

.btn-primary{
  height:44px;
  padding:0 20px;
  border-radius:11px;
  background:linear-gradient(135deg,var(--accent),#2563eb);
  color:#fff;
  font-weight:700;
  font-size:13.5px;
  display:flex;
  align-items:center;
  gap:7px;
  box-shadow:0 4px 16px rgba(59,130,246,0.4);
  transition:all .2s ease-out;
}
.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(59,130,246,0.5);
}
.btn-primary:active{transform:translateY(0);}

/* ============ BODY LAYOUT ============ */
.body-wrap{
  display:flex;
  gap:20px;
  padding:20px 24px;
  align-items:flex-start;
}

/* ============ SIDEBAR ============ */
.sidebar{
  width:300px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:16px;
  position:sticky;
  top:96px;
}
.panel{
  background:var(--card);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  border:1px solid rgba(226,232,240,0.7);
}
.panel-glass{
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.65);
}

/* Mini calendar */
.mini-cal{padding:16px;}
.mini-cal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:12px;
}
.mini-cal-month{
  font-size:14px;
  font-weight:700;
  color:var(--navy);
}
.mini-nav{
  display:flex;gap:2px;
}
.mini-nav-btn{
  width:28px;height:28px;
  border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);
  transition:all .2s ease-out;
}
.mini-nav-btn:hover{background:var(--bg);color:var(--accent);}
.mini-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.mini-dow{
  text-align:center;
  font-size:10px;
  font-weight:700;
  color:var(--text-muted);
  padding:4px 0;
}
.mini-day{
  aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
  font-size:11.5px;
  font-weight:600;
  border-radius:8px;
  color:var(--text);
  transition:all .15s ease-out;
}
.mini-day:hover{background:var(--bg);}
.mini-day.muted{color:#cbd5e1;}
.mini-day.today{
  background:var(--accent);
  color:#fff;
  font-weight:800;
  box-shadow:0 2px 8px rgba(59,130,246,0.4);
}
.mini-day.has-appt{
  position:relative;
}
.mini-day.has-appt::after{
  content:'';
  position:absolute;
  bottom:3px;
  width:4px;height:4px;
  border-radius:50%;
  background:var(--green);
}
.mini-day.today.has-appt::after{background:#fff;}

/* Sidebar section */
.sb-section{padding:16px;}
.sb-title{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.05em;
  color:var(--text-muted);
  margin-bottom:11px;
  display:flex;
  align-items:center;
  gap:6px;
}

/* Filter chips */
.chip-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.chip{
  height:34px;
  padding:0 13px;
  border-radius:9px;
  font-size:12.5px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:6px;
  border:1.5px solid var(--border);
  color:var(--text-muted);
  background:var(--card);
  transition:all .2s ease-out;
}
.chip:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(15,41,66,0.1);}
.chip .dot{width:8px;height:8px;border-radius:50%;}
.chip.active{
  background:var(--navy);
  color:#fff;
  border-color:var(--navy);
}
.chip.chip-green.active{background:var(--green);border-color:var(--green);}
.chip.chip-amber.active{background:var(--amber);border-color:var(--amber);}
.chip.chip-red.active{background:var(--red);border-color:var(--red);}
.chip-green .dot{background:var(--green);}
.chip-amber .dot{background:var(--amber);}
.chip-red .dot{background:var(--red);}
.chip.active .dot{background:#fff;}

/* Select */
.field-label{
  font-size:11px;
  font-weight:700;
  color:var(--text-muted);
  margin-bottom:6px;
  display:block;
}
.select-wrap{position:relative;}
.styled-select{
  width:100%;
  height:44px;
  padding:0 14px;
  border-radius:11px;
  border:1.5px solid var(--border);
  background:var(--card);
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  color:var(--text);
  appearance:none;
  cursor:pointer;
  transition:all .2s ease-out;
}
.styled-select:hover{border-color:var(--accent-light);}
.styled-select:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(59,130,246,0.12);
}
.select-arrow{
  position:absolute;
  left:12px;top:50%;
  transform:translateY(-50%);
  pointer-events:none;
  color:var(--text-muted);
}

/* Stats cards */
.stat-card{
  padding:16px;
  display:flex;
  align-items:center;
  gap:13px;
}
.stat-icon{
  width:46px;height:46px;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.stat-icon.accent{
  background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(59,130,246,0.05));
  color:var(--accent);
}
.stat-icon.green{
  background:linear-gradient(135deg,rgba(22,163,74,0.15),rgba(22,163,74,0.05));
  color:var(--green);
}
.stat-num{
  font-size:24px;
  font-weight:800;
  color:var(--text);
  letter-spacing:-0.02em;
  line-height:1;
}
.stat-label{
  font-size:12px;
  color:var(--text-muted);
  font-weight:600;
  margin-top:3px;
}

/* ============ MAIN CALENDAR ============ */
.main{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* Month grid */
.cal-grid{
  background:var(--card);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  border:1px solid rgba(226,232,240,0.7);
  overflow:hidden;
}
.dow-row{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,#f8fafc,#fff);
}
.dow-cell{
  padding:13px 0;
  text-align:center;
  font-size:13px;
  font-weight:700;
  color:var(--text-muted);
}
.dow-cell.weekend{color:var(--accent);}
.days-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
}
.day-cell{
  min-height:120px;
  border-left:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:8px;
  position:relative;
  cursor:pointer;
  transition:background .2s ease-out,box-shadow .2s ease-out;
  display:flex;
  flex-direction:column;
  gap:5px;
  opacity:0;
  animation:slideInUp .4s ease-out forwards;
}
.day-cell:nth-child(7n){border-left:none;}
.day-cell:hover{
  background:rgba(59,130,246,0.05);
  box-shadow:inset 0 0 0 1px rgba(59,130,246,0.2);
  z-index:2;
}
.day-cell.weekend{background:#fafafa;}
.day-cell.weekend:hover{background:rgba(59,130,246,0.05);}
.day-cell.other-month{background:#fbfcfd;}
.day-cell.other-month .day-num{color:#cbd5e1;}
.day-cell.selected{
  background:rgba(59,130,246,0.07);
  box-shadow:inset 3px 0 0 var(--accent);
}
.day-cell.selected:hover{background:rgba(59,130,246,0.1);}

.day-num{
  font-size:14px;
  font-weight:700;
  color:var(--text);
  align-self:flex-end;
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  flex-shrink:0;
}
.day-cell.today .day-num{
  background:var(--accent);
  color:#fff;
  font-weight:800;
  box-shadow:0 3px 10px rgba(59,130,246,0.45);
}

/* Appointment pills */
.appt-pill{
  border-radius:7px;
  padding:4px 8px;
  font-size:11px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:5px;
  cursor:pointer;
  animation:pillPop .35s ease-out backwards;
  transition:transform .15s ease-out,box-shadow .15s ease-out;
  overflow:hidden;
}
.appt-pill:hover{
  transform:translateX(-2px);
  box-shadow:0 3px 9px rgba(15,41,66,0.18);
}
.appt-pill .pill-time{
  font-weight:800;
  font-size:10.5px;
  flex-shrink:0;
}
.appt-pill .pill-name{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.appt-pill.set{
  background:linear-gradient(135deg,#dcfce7,#bbf7d0);
  color:#15803d;
}
.appt-pill.pending{
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  color:#b45309;
}
.pill-more{
  font-size:10.5px;
  font-weight:700;
  color:var(--accent);
  padding:2px 6px;
  border-radius:6px;
  background:rgba(59,130,246,0.1);
  cursor:pointer;
  align-self:flex-start;
  transition:background .15s ease-out;
}
.pill-more:hover{background:rgba(59,130,246,0.2);}

/* ============ DAY DETAIL PANEL ============ */
.day-panel{
  background:var(--card);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  border:1px solid rgba(226,232,240,0.7);
  overflow:hidden;
  animation:slideInUp .35s ease-out;
}
.day-panel-head{
  display:flex;
  align-items:center;
  gap:12px;
  padding:18px 22px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,#f8fafc,#fff);
}
.day-panel-date{
  font-size:17px;
  font-weight:800;
  color:var(--navy);
  letter-spacing:-0.01em;
}
.count-badge{
  height:24px;
  min-width:24px;
  padding:0 8px;
  border-radius:12px;
  background:rgba(59,130,246,0.12);
  color:var(--accent);
  font-size:12px;
  font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.day-panel-head .header-spacer{flex:1;}
.btn-add-day{
  height:40px;
  padding:0 16px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#2563eb);
  color:#fff;
  font-weight:700;
  font-size:13px;
  display:flex;align-items:center;gap:6px;
  box-shadow:0 3px 12px rgba(59,130,246,0.35);
  transition:all .2s ease-out;
}
.btn-add-day:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(59,130,246,0.45);}
.btn-close{
  width:40px;height:40px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);
  transition:all .2s ease-out;
}
.btn-close:hover{background:var(--red-light);color:var(--red);}

.day-panel-body{
  padding:18px 22px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.appt-card{
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 18px;
  display:flex;
  align-items:center;
  gap:18px;
  position:relative;
  background:var(--card);
  transition:transform .2s ease-out,box-shadow .2s ease-out;
}
.appt-card::before{
  content:'';
  position:absolute;
  right:0;top:0;bottom:0;
  width:4px;
  border-radius:0 4px 4px 0;
}
.appt-card.set::before{background:var(--green);}
.appt-card.pending::before{background:var(--amber);}
.appt-card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow);
  border-color:transparent;
}
.appt-time-block{
  text-align:center;
  flex-shrink:0;
  padding-left:18px;
  border-left:1px solid var(--border);
}
.appt-time{
  font-size:22px;
  font-weight:800;
  color:var(--accent);
  letter-spacing:-0.02em;
  line-height:1;
}
.appt-time-label{
  font-size:10px;
  color:var(--text-muted);
  font-weight:600;
  margin-top:4px;
}
.appt-info{flex:1;min-width:0;}
.appt-driver-row{
  display:flex;
  align-items:center;
  gap:9px;
  margin-bottom:7px;
  flex-wrap:wrap;
}
.appt-driver{
  font-size:15px;
  font-weight:700;
  color:var(--text);
}
.vehicle-chip{
  height:23px;
  padding:0 9px;
  border-radius:7px;
  background:var(--bg);
  font-size:11.5px;
  font-weight:700;
  color:var(--navy);
  display:flex;align-items:center;gap:4px;
  font-variant-numeric:tabular-nums;
}
.appt-meta-row{
  display:flex;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
}
.reason-badge{
  height:25px;
  padding:0 11px;
  border-radius:13px;
  font-size:11.5px;
  font-weight:700;
  display:flex;align-items:center;gap:5px;
}
.reason-badge.set{background:var(--green-light);color:#15803d;}
.reason-badge.pending{background:var(--amber-light);color:#b45309;}
.appt-garage{
  font-size:12.5px;
  color:var(--text-muted);
  font-weight:600;
  display:flex;align-items:center;gap:5px;
}
.appt-actions{
  display:flex;
  gap:8px;
  flex-shrink:0;
}
.action-btn{
  height:38px;
  padding:0 13px;
  border-radius:9px;
  font-size:12.5px;
  font-weight:700;
  display:flex;align-items:center;gap:6px;
  border:1.5px solid var(--border);
  color:var(--text-muted);
  transition:all .2s ease-out;
}
.action-btn:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:rgba(59,130,246,0.06);
}
.action-btn.danger:hover{
  border-color:var(--red);
  color:var(--red);
  background:var(--red-light);
}

/* ============ MODAL ============ */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(15,41,66,0.7);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
  padding:24px;
  animation:fadeIn .25s ease-out;
}
.modal{
  width:480px;
  max-width:100%;
  max-height:92vh;
  overflow-y:auto;
  background:var(--card);
  border-radius:20px;
  box-shadow:0 24px 70px rgba(15,41,66,0.5);
  animation:modalIn .25s ease-out;
}
.modal-head{
  background:linear-gradient(135deg,var(--navy),var(--navy-light));
  padding:22px 24px;
  display:flex;
  align-items:center;
  gap:13px;
  position:relative;
}
.modal-head-icon{
  width:42px;height:42px;
  border-radius:11px;

];

const DOW = ['א','ב','ג','ד','ה','ו','ש'];
const HEB_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const HEB_DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

const YEAR = 2026, MONTH = 4;          // May 2026 (0-indexed)
const TODAY = 21, SELECTED = 21;

function appointmentsFor(dateStr){
  return SAMPLE_APPOINTMENTS.filter(a => a.date === dateStr)
                            .sort((a,b)=>a.time.localeCompare(b.time));
}
function pad(n){ return String(n).padStart(2,'0'); }
function dateStr(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }

/* ---- Day-of-week header ---- */
const dowRow = document.getElementById('dowRow');
DOW.forEach((d,i)=>{
  const c = document.createElement('div');
  c.className = 'dow-cell' + (i===5||i===6 ? ' weekend':'');
  c.textContent = d;
  dowRow.appendChild(c);
});

/* ---- Month grid ---- */
const daysGrid = document.getElementById('daysGrid');
const firstDow = new Date(YEAR,MONTH,1).getDay();
const daysInMonth = new Date(YEAR,MONTH+1,0).getDate();
const daysInPrev  = new Date(YEAR,MONTH,0).getDate();
const totalCells  = Math.ceil((firstDow + daysInMonth)/7)*7;

let cellIndex = 0;
for(let i=0;i<totalCells;i++){
  const cell = document.createElement('div');
  const col = i % 7;
  const isWeekend = (col===5 || col===6);
  let dayNum, isOther=false, dateKey=null;

  if(i < firstDow){
    dayNum = daysInPrev - firstDow + 1 + i; isOther = true;
  } else if(i >= firstDow + daysInMonth){
    dayNum = i - firstDow - daysInMonth + 1; isOther = true;
  } else {
    dayNum = i - firstDow + 1;
    dateKey = dateStr(YEAR,MONTH,dayNum);
  }

  cell.className = 'day-cell'
    + (isWeekend ? ' weekend':'')
    + (isOther ? ' other-month':'')
    + (!isOther && dayNum===TODAY ? ' today':'')
    + (!isOther && dayNum===SELECTED ? ' selected':'');
  cell.style.animationDelay = (cellIndex++ * 20) + 'ms';

  const num = document.createElement('div');
  num.className = 'day-num';
  num.textContent = dayNum;
  cell.appendChild(num);

  if(dateKey){
    const appts = appointmentsFor(dateKey);
    const visible = appts.slice(0,3);
    visible.forEach((a,idx)=>{
      const pill = document.createElement('div');
      pill.className = 'appt-pill ' + (a.status==='appointment_set' ? 'set':'pending');
      pill.style.animationDelay = (idx*60 + 120) + 'ms';
      pill.innerHTML = '<span class="pill-time">'+a.time+'</span>'
                     + '<span class="pill-name">'+a.driver+'</span>';
      cell.appendChild(pill);
    });
    if(appts.length > 3){
      const more = document.createElement('div');
      more.className = 'pill-more';
      more.textContent = '+'+(appts.length-3)+' נוספים';
      cell.appendChild(more);
    }
  }
  daysGrid.appendChild(cell);
}

/* ---- Mini calendar ---- */
const miniGrid = document.getElementById('miniGrid');
DOW.forEach(d=>{
  const h = document.createElement('div');
  h.className = 'mini-dow'; h.textContent = d;
  miniGrid.appendChild(h);
});
for(let i=0;i<totalCells;i++){
  const cell = document.createElement('div');
  let dayNum, isOther=false, dateKey=null;
  if(i < firstDow){ dayNum = daysInPrev-firstDow+1+i; isOther=true; }
  else if(i >= firstDow+daysInMonth){ dayNum = i-firstDow-daysInMonth+1; isOther=true; }
  else { dayNum = i-firstDow+1; dateKey = dateStr(YEAR,MONTH,dayNum); }

  cell.className = 'mini-day'
    + (isOther ? ' muted':'')
    + (!isOther && dayNum===TODAY ? ' today':'')
    + (dateKey && appointmentsFor(dateKey).length ? ' has-appt':'');
  cell.textContent = dayNum;
  miniGrid.appendChild(cell);
}

/* ---- Day detail panel ---- */
const reasonClass = a => a.status==='appointment_set' ? 'set' : 'pending';
function buildDayPanel(){
  const body = document.getElementById('dayPanelBody');
  const appts = appointmentsFor(dateStr(YEAR,MONTH,SELECTED));
  body.innerHTML = '';
  appts.forEach((a,idx)=>{
    const card = document.createElement('div');
    card.className = 'appt-card ' + reasonClass(a);
    card.style.animation = 'slideInUp .35s ease-out backwards';
    card.style.animationDelay = (idx*80) + 'ms';
    card.innerHTML = `
      <div class="appt-time-block">
        <div class="appt-time">${a.time}</div>
        <div class="appt-time-label">שעה</div>
      </div>
      <div class="appt-info">
        <div class="appt-driver-row">
          <span class="appt-driver">${a.driver}</span>
          <span class="vehicle-chip">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"/>
              <circle cx="6.5" cy="16.5" r="2.5"/><circle cx="16.5" cy="16.5" r="2.5"/>
            </svg>
            ${a.vehicle}
          </span>
        </div>
        <div class="appt-meta-row">
          <span class="reason-badge ${reasonClass(a)}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
            ${a.reason}
          </span>
          <span class="appt-garage">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/>
              <line x1="9" y1="9" x2="9" y2="9.01"/><line x1="9" y1="12" x2="9" y2="12.01"/>
            </svg>
            ${a.garage}
          </span>
        </div>
      </div>
      <div class="appt-actions">
        <button class="action-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          ערוך
        </button>
        <button class="action-btn danger">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          בטל תור
        </button>
      </div>`;
    body.appendChild(card);
  });
}
buildDayPanel();
</script>
</body>
</html>
