<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="עלה נהגים">
<meta name="theme-color" content="#000000">
<title>עלה נהגים</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8000D;
  --red-dim: rgba(232,0,13,0.12);
  --red-glow: rgba(232,0,13,0.3);
  --black: #000;
  --card: #111;
  --card2: #1a1a1a;
  --border: rgba(255,255,255,0.07);
  --t1: #fff;
  --t2: #8A8A8E;
  --t3: #2c2c2e;
  --warn: #FF9F0A;
  --ok: #30D158;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body { background:#000; font-family:'Inter',-apple-system,sans-serif; color:#fff; overscroll-behavior:none; }

@keyframes fadeUp    { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
@keyframes carFloat  { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-7px) scale(1.01)} }
@keyframes groundGlow{ 0%,100%{opacity:0.25;transform:scaleX(1)} 50%{opacity:0.55;transform:scaleX(1.08)} }
@keyframes headlightPulse{ 0%,100%{opacity:0.5;filter:blur(3px)} 50%{opacity:1;filter:blur(5px)} }
@keyframes fabPulse  { 0%,100%{box-shadow:0 6px 28px var(--red-glow)} 50%{box-shadow:0 6px 48px rgba(232,0,13,0.6)} }
@keyframes badgeBeat { 0%,100%{transform:scale(1)} 40%{transform:scale(1.25)} }
@keyframes pillGlow  { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 10px rgba(232,0,13,0.4)} }
@keyframes scanLine  { 0%{transform:translateY(-100%);opacity:0} 15%{opacity:0.4} 85%{opacity:0.4} 100%{transform:translateY(400%);opacity:0} }
@keyframes slideInRight{ from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
@keyframes dotPing   { 0%{transform:scale(1);opacity:1} 75%,100%{transform:scale(2.2);opacity:0} }
@keyframes heroReveal{ from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
@keyframes spin      { to{transform:rotate(360deg)} }

#app { width:100%; height:100%; display:flex; flex-direction:column; max-width:430px; margin:0 auto; position:relative; }

.sb { height:44px; background:#000; display:flex; align-items:flex-end; justify-content:space-between; padding:0 20px 8px; flex-shrink:0; }
.sb-time { font-size:15px; font-weight:600; letter-spacing:-0.3px; }
.sb-r { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:500; }

.topbar { background:#000; padding:4px 20px 12px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.tb-btn { width:40px; height:40px; background:var(--card); border-radius:13px; display:flex; align-items:center; justify-content:center; position:relative; border:1px solid var(--border); cursor:pointer; }
.tb-badge { position:absolute; top:-4px; right:-4px; width:16px; height:16px; background:var(--red); border-radius:50%; border:2.5px solid #000; font-size:9px; font-weight:800; display:flex; align-items:center; justify-content:center; animation:badgeBeat 2s ease-in-out infinite; }
.tb-badge.hidden { display:none; }
.tb-logo { font-size:13px; font-weight:800; letter-spacing:5px; }
.tb-user { display:flex; align-items:center; gap:8px; }
.tb-greet-hi { font-size:11px; color:var(--t2); text-align:left; }
.tb-greet-name { font-size:13px; font-weight:700; letter-spacing:-0.2px; text-align:left; }
.tb-avatar { width:40px; height:40px; background:var(--card); border-radius:13px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.tb-avatar img { width:100%; height:100%; object-fit:cover; }

.phead { background:#000; padding:8px 20px 12px; flex-shrink:0; }
.ph-row { display:flex; align-items:center; justify-content:space-between; }
.ph-title { font-size:18px; font-weight:700; letter-spacing:-0.4px; }
.ph-sub { font-size:12px; color:var(--t2); margin-top:2px; direction:ltr; }

.content { flex:1; overflow-y:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.content::-webkit-scrollbar { display:none; }

.screen { display:none; flex-direction:column; height:100%; }
.screen.active { display:flex; }

.hero-card { margin:0 16px; background:var(--card); border-radius:26px; overflow:hidden; border:1px solid var(--border); animation:heroReveal .6s cubic-bezier(.16,1,.3,1) .1s both; }
.hero-img-area { height:185px; position:relative; overflow:hidden; background:linear-gradient(180deg,#0e0e0e 0%,#111 100%); display:flex; align-items:center; justify-content:center; }
.hero-img-area::before { content:''; position:absolute; inset:0; z-index:3; pointer-events:none; background:linear-gradient(180deg,transparent 0%,rgba(255,255,255,0.03) 50%,transparent 100%); height:60px; width:100%; animation:scanLine 4s ease-in-out infinite; }
.hero-img-area::after { content:''; position:absolute; bottom:0; left:0; right:0; height:80px; background:linear-gradient(to bottom,transparent,var(--card)); z-index:4; pointer-events:none; }
.car-wrap { position:relative; z-index:2; width:100%; height:100%; display:flex; align-items:center; justify-content:center; animation:carFloat 5s ease-in-out infinite; }
.car-img { width:110%; max-width:420px; mix-blend-mode:screen; filter:brightness(1.05) contrast(1.05); position:relative; z-index:2; transform:translateX(-5%); }
.car-glow { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); width:240px; height:18px; background:radial-gradient(ellipse,rgba(255,255,255,0.18) 0%,transparent 70%); border-radius:50%; z-index:1; animation:groundGlow 5s ease-in-out infinite; }
.hl-glow { position:absolute; top:68px; right:28px; width:22px; height:8px; background:rgba(200,220,255,0.8); border-radius:50%; filter:blur(4px); animation:headlightPulse 3s ease-in-out infinite; z-index:5; }
.hero-body { padding:0 20px 18px; }
.hero-name { font-size:22px; font-weight:800; text-align:center; letter-spacing:-0.5px; animation:fadeUp .5s ease .3s both; }
.hero-plate { font-size:13px; color:var(--t2); text-align:center; margin-top:2px; direction:ltr; animation:fadeUp .5s ease .35s both; }
.hero-btns { display:flex; gap:10px; margin-top:14px; animation:fadeUp .5s ease .4s both; }
.hero-btn { flex:1; border:1.5px solid rgba(255,255,255,0.18); background:transparent; color:#fff; border-radius:100px; padding:10px 0; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; letter-spacing:-0.2px; transition:all .2s; }
.hero-btn:active { background:rgba(255,255,255,0.08); }
.hero-alert { margin:12px 0 0; background:#161616; border-radius:14px; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; border-right:2.5px solid var(--red); animation:fadeUp .5s ease .45s both; }
.ha-title { font-size:13px; font-weight:600; letter-spacing:-0.2px; }
.ha-sub { font-size:11px; color:var(--t2); margin-top:3px; }
.dots { display:flex; justify-content:center; gap:5px; margin:12px 0 4px; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--t3); }
.dot.a { background:var(--red); width:20px; border-radius:3px; }
.sec { padding:18px 20px 10px; font-size:18px; font-weight:700; letter-spacing:-0.4px; animation:fadeUp .5s ease .5s both; }
.qa { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:0 16px; }
.qa-card { background:var(--card); border-radius:18px; padding:16px 10px 14px; display:flex; flex-direction:column; align-items:center; gap:10px; border:1px solid var(--border); cursor:pointer; transition:transform .15s; }
.qa-card:nth-child(1){animation:fadeUp .5s ease .55s both}
.qa-card:nth-child(2){animation:fadeUp .5s ease .6s both}
.qa-card:nth-child(3){animation:fadeUp .5s ease .65s both}
.qa-card:active{transform:scale(0.97)}
.qa-icon-box { width:46px; height:46px; background:var(--red-dim); border-radius:14px; display:flex; align-items:center; justify-content:center; }
.qa-lbl { font-size:11px; color:var(--t2); font-weight:500; text-align:center; line-height:1.3; }

.bnav { background:rgba(0,0,0,0.96); border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; padding:10px 10px; padding-bottom:max(10px,env(safe-area-inset-bottom,10px)); flex-shrink:0; }
.bn-item { display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 8px; border-radius:14px; cursor:pointer; min-width:56px; transition:all .2s; }
.bn-item.active { background:#fff; flex-direction:row; gap:5px; padding:9px 16px; }
.bn-lbl { font-size:10px; color:var(--t2); font-weight:500; }
.bn-item.active .bn-lbl { color:#000; font-size:13px; font-weight:700; }
.bn-ic { color:var(--t3); }
.bn-item.active .bn-ic { color:#000; }

.fab { position:fixed; bottom:calc(78px + env(safe-area-inset-bottom,0px)); left:20px; background:var(--red); color:#fff; border-radius:100px; padding:13px 20px; font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px; cursor:pointer; font-family:inherit; letter-spacing:-0.2px; z-index:50; white-space:nowrap; animation:fabPulse 2.5s ease-in-out infinite; border:none; }
.fab:active{transform:scale(0.96)}

.tabs { display:flex; background:#000; padding:0 16px; border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none; flex-shrink:0; }
.tabs::-webkit-scrollbar{display:none}
.tab { padding:12px 14px; font-size:13px; font-weight:500; color:var(--t2); white-space:nowrap; border-bottom:2px solid transparent; cursor:pointer; flex-shrink:0; transition:color .2s; }
.tab.active { color:#fff; font-weight:700; border-bottom-color:var(--red); }

.igrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:16px; }
.ig-card { background:var(--card); border-radius:18px; padding:16px; border:1px solid var(--border); animation:fadeUp .4s ease both; }
.ig-icon { margin-bottom:10px; }
.ig-lbl { font-size:11px; color:var(--t2); }
.ig-val { font-size:18px; font-weight:700; margin-top:4px; letter-spacing:-0.4px; }
.ig-val.warn { color:var(--warn); }

.ssec { padding:12px 20px 6px; display:flex; align-items:baseline; justify-content:space-between; }
.ss-lbl { font-size:15px; font-weight:700; }
.ss-count { font-size:12px; color:var(--t2); }
.alert-card { margin:0 16px 10px; background:var(--card); border-radius:18px; padding:14px 16px; border:1px solid var(--border); border-right:2.5px solid var(--red); animation:slideInRight .4s ease both; }
.alert-card.warn{border-right-color:var(--warn)}
.alert-card.ok{border-right-color:var(--ok)}
.ac-row { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.ac-title { font-size:14px; font-weight:600; letter-spacing:-0.2px; }
.ac-sub { font-size:12px; color:var(--t2); margin-top:3px; }
.ac-date { font-size:12px; font-weight:600; margin-top:8px; }
.ac-date.red{color:var(--red)}.ac-date.warn{color:var(--warn)}
.ping-wrap { position:relative; width:10px; height:10px; flex-shrink:0; margin-top:4px; }
.ping-dot { position:absolute; inset:0; border-radius:50%; background:var(--red); }
.ping-ring { position:absolute; inset:0; border-radius:50%; background:var(--red); animation:dotPing 1.5s cubic-bezier(0,0,.2,1) infinite; }
.pill { padding:4px 11px; border-radius:100px; font-size:11px; font-weight:700; white-space:nowrap; }
.pill.red{background:var(--red-dim);color:var(--red);animation:pillGlow 2s ease-in-out infinite}
.pill.warn{background:rgba(255,159,10,0.12);color:var(--warn)}
.pill.ok{background:rgba(48,209,88,0.12);color:var(--ok)}

.timeline { padding:12px 16px 16px; }
.tl-row { display:flex; gap:16px; margin-bottom:10px; }
.tl-left { display:flex; flex-direction:column; align-items:center; padding-top:16px; width:14px; flex-shrink:0; }
.tl-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.tl-dot.red{background:var(--red);box-shadow:0 0 0 4px rgba(232,0,13,0.15)}
.tl-dot.gray{background:#2c2c2e}
.tl-line-v { width:1.5px; flex:1; background:var(--t3); margin-top:4px; }
.tl-card { flex:1; background:var(--card); border-radius:18px; padding:14px 16px; border:1px solid var(--border); animation:fadeUp .4s ease both; }
.tc-date { font-size:15px; font-weight:700; display:flex; align-items:center; gap:6px; }
.tc-red-dot { width:7px; height:7px; border-radius:50%; background:var(--red); flex-shrink:0; }
.tc-divider { height:1px; background:var(--border); margin:10px 0; }
.tc-row { display:flex; align-items:center; gap:8px; margin-top:5px; }
.tc-lbl { font-size:12px; color:var(--t2); }
.tc-tag { display:inline-block; border:1.5px solid rgba(255,255,255,0.18); border-radius:100px; padding:5px 14px; font-size:12px; font-weight:600; margin-top:10px; }

.km-card { margin:16px 16px 0; background:var(--card); border-radius:18px; padding:18px; border:1px solid rgba(48,209,88,0.15); animation:fadeUp .4s ease .1s both; }
.km-label { font-size:12px; color:var(--ok); font-weight:700; letter-spacing:0.5px; text-transform:uppercase; }
.km-prev { font-size:12px; color:var(--t2); margin-top:4px; }
.km-input-row { display:flex; gap:10px; margin-top:12px; }
.km-input { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(48,209,88,0.3); border-radius:12px; padding:12px 14px; color:#fff; font-size:18px; font-weight:700; direction:ltr; text-align:center; font-family:inherit; outline:none; }
.km-btn { background:var(--ok); border:none; border-radius:12px; padding:12px 18px; color:#000; font-weight:800; font-size:14px; cursor:pointer; font-family:inherit; }
.fault-card { margin:12px 16px; background:var(--card); border-radius:18px; padding:16px; border:1px solid rgba(232,0,13,0.12); animation:fadeUp .4s ease .25s both; }
.fault-label { font-size:12px; color:var(--red); font-weight:700; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:10px; }
.fault-textarea { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; padding:12px; color:var(--t2); font-size:13px; min-height:80px; font-family:inherit; resize:none; outline:none; }
.fault-btn { margin-top:10px; width:100%; background:var(--red); border:none; border-radius:12px; padding:12px; color:#fff; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; animation:fabPulse 2.5s ease-in-out infinite; }

.doc-row { margin:0 16px 8px; background:var(--card); border-radius:16px; padding:14px 16px; display:flex; align-items:center; gap:14px; border:1px solid var(--border); animation:fadeUp .3s ease both; cursor:pointer; }
.dr-icon-wrap { width:40px; height:40px; background:var(--card2); border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.dr-body{flex:1}
.dr-title{font-size:14px;font-weight:600}
.dr-sub{font-size:12px;color:var(--t2);margin-top:2px}
.dr-sub.warn{color:var(--warn)}

#login-screen { position:fixed; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
#login-screen.hidden { display:none; }
.login-logo { font-size:36px; font-weight:900; letter-spacing:8px; margin-bottom:8px; }
.login-mark { width:72px; height:72px; background:var(--red); border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:24px; }
.login-sub { font-size:13px; color:var(--t2); margin-bottom:48px; }
.login-btn { background:#fff; color:#000; border:none; border-radius:100px; padding:14px 28px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:10px; }
.login-btn:active { transform:scale(0.97); }
.login-err { color:var(--red); font-size:13px; margin-top:16px; text-align:center; max-width:280px; line-height:1.5; }
.login-err.hidden { display:none; }

#loader { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:200; transition:opacity .3s; }
#loader.hidden { opacity:0; pointer-events:none; }
.loader-ring { width:36px; height:36px; border:3px solid var(--t3); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; }

#toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:#1c1c1e; color:#fff; padding:12px 20px; border-radius:100px; font-size:13px; font-weight:500; z-index:300; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; }
#toast.show { opacity:1; }

.empty { padding:48px 24px; text-align:center; color:var(--t2); font-size:14px; }
</style>
</head>

<symbol id="ic-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></symbol>
<symbol id="ic-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></symbol>
<symbol id="ic-google" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></symbol>
</defs>
</svg>

<div id="loader"><div class="loader-ring"></div></div>

<div id="login-screen" class="hidden">
  <div class="login-mark">
    <svg width="36" height="36"><use href="#ic-car" color="#fff"/></svg>
  </div>
  <div class="login-logo">עלה</div>
  <div class="login-sub">מערכת ניהול צי רכבים</div>
  <button class="login-btn" id="login-btn">
    <svg width="20" height="20"><use href="#ic-google"/></svg>
    כניסה עם Google
  </button>
  <div class="login-err hidden" id="login-err"></div>
  <button onclick="demoLogin()" style="margin-top:16px;background:transparent;border:1px solid #333;color:#666;border-radius:100px;padding:10px 24px;font-size:13px;cursor:pointer;font-family:inherit;">כניסה דמו (בדיקה בלבד)</button>
</div>

<div id="toast"></div>

<div id="app" class="hidden">
  <div class="sb">
    <span class="sb-time" id="sb-time">9:22</span>
    <div class="sb-r">
      <svg width="15" height="11" viewBox="0 0 15 11"><rect x="0" y="3" width="2.5" height="8" rx=".4" fill="white"/><rect x="4" y="2" width="2.5" height="9" rx=".4" fill="white"/><rect x="8" y="0" width="2.5" height="11" rx=".4" fill="white"/><rect x="12" y="0" width="2.5" height="11" rx=".4" fill="white" opacity=".3"/></svg>
      <svg width="16" height="12" viewBox="0 0 24 12" fill="none" stroke="white" stroke-width="1.6"><path d="M1 3.5Q12 0 23 3.5"/><path d="M4 7Q12 4.5 20 7"/><path d="M8 10.5Q12 9 16 10.5"/><circle cx="12" cy="10.5" r="1.2" fill="white" stroke="none"/></svg>
    </div>
  </div>

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="topbar">
      <div style="display:flex;gap:8px">
        <div class="tb-btn" onclick="APP.nav('alerts')">
          <svg width="20" height="20"><use href="#ic-bell" color="#fff"/></svg>
          <div class="tb-badge hidden" id="alert-badge">0</div>
        </div>
      </div>
      <div class="tb-logo">עלה</div>
      <div class="tb-user">
        <div>
          <div class="tb-greet-hi">שלום,</div>
          <div class="tb-greet-name" id="user-name">—</div>
        </div>
        <div class="tb-avatar" id="user-avatar">
          <svg width="22" height="22"><use href="#ic-user" color="#8A8A8E"/></svg>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="hero-card">
        <div class="hero-img-area">
          <div class="hl-glow"></div>
          <div class="car-glow"></div>
          <div class="car-wrap">
            <img id="car-photo"
              src="https://toyota-select.co.il/wp-content/uploads/2025/04/MODELS-SELECT-8.png"
              class="car-img" alt="רכב"
              onerror="this.style.opacity='0'"/>
          </div>
        </div>
        <div class="hero-body">
          <div class="hero-name" id="car-name">טויוטה הייסנדר</div>
          <div class="hero-plate" id="car-plate">—</div>
          <div class="hero-btns">
            <button class="hero-btn" onclick="APP.nav('vehicle');APP.switchTab('docs')">מסמכי הרכב</button>
            <button class="hero-btn" onclick="APP.nav('vehicle');APP.switchTab('agency')">סוכנות שלך</button>
          </div>
          <div class="hero-alert hidden" id="home-alert">
            <div>
              <div class="ha-title" id="home-alert-title">התראה</div>
              <div class="ha-sub" id="home-alert-sub">—</div>
            </div>
            <div class="ping-wrap"><div class="ping-dot"></div><div class="ping-ring"></div></div>
          </div>
        </div>
      </div>
      <div class="dots"><div class="dot a"></div></div>
      <div class="sec">לשירותך</div>
      <div class="qa">
        <div class="qa-card" onclick="APP.nav('service');setTimeout(()=>document.getElementById('fault-section').scrollIntoView({behavior:'smooth'}),100)">
          <div class="qa-icon-box"><svg width="22" height="22"><use href="#ic-alert" color="#E8000D"/></svg></div>
          <div class="qa-lbl">ביטול<br>טיפול</div>
        </div>
        <div class="qa-card" onclick="APP.nav('service')">
          <div class="qa-icon-box"><svg width="22" height="22"><use href="#ic-gauge" color="#E8000D"/></svg></div>
          <div class="qa-lbl">עדכון<br>ק"מ</div>
        </div>
        <div class="qa-card" onclick="APP.nav('service');setTimeout(()=>document.getElementById('fault-section').scrollIntoView({behavior:'smooth'}),100)">
          <div class="qa-icon-box"><svg width="22" height="22"><use href="#ic-tool" color="#E8000D"/></svg></div>
          <div class="qa-lbl">דיווח<br>תקלה</div>
        </div>
      </div>
      <div style="height:120px"></div>
    </div>
  </div>

  <!-- VEHICLE -->
  <div class="screen" id="screen-vehicle">
    <div class="phead">
      <div class="ph-row"><div class="ph-title" id="veh-title">הרכב</div></div>
      <div class="ph-sub" id="veh-sub">—</div>
    </div>
    <div class="tabs" id="veh-tabs">
      <div class="tab active" data-tab="info"      onclick="APP.switchTab('info')">הרכב</div>
      <div class="tab"        data-tab="history"   onclick="APP.switchTab('history')">היסטוריה</div>
      <div class="tab"        data-tab="docs"      onclick="APP.switchTab('docs')">מסמכים</div>
      <div class="tab"        data-tab="insurance" onclick="APP.switchTab('insurance')">ביטוח</div>
      <div class="tab"        data-tab="agency"    onclick="APP.switchTab('agency')">סוכנות</div>
    </div>
    <div class="content" id="veh-content"></div>
  </div>

  <!-- ALERTS -->
  <div class="screen" id="screen-alerts">
    <div class="phead">
      <div class="ph-row">
        <div class="ph-title">התראות</div>
        <div id="alerts-count" style="font-size:13px;color:var(--t2)">0 התראות</div>
      </div>
    </div>
    <div class="content" id="alerts-content">
      <div class="empty hidden" id="alerts-empty">אין התראות פעילות</div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="screen-history">
    <div class="phead">
      <div class="ph-row"><div class="ph-title">היסטוריית טיפולים</div></div>
    </div>
    <div class="content">
      <div class="timeline" id="history-timeline"></div>
    </div>
  </div>

  <!-- SERVICE -->
  <div class="screen" id="screen-service">
    <div class="phead">
      <div class="ph-row"><div class="ph-title">שירות</div></div>
    </div>
    <div class="content">
      <div class="km-card">
        <div class="km-label">עדכון ק"מ</div>
        <div class="km-prev" id="km-prev">ק"מ אחרון: —</div>
        <div class="km-input-row">
          <input class="km-input" id="km-input" type="number" placeholder='הכנס ק"מ' inputmode="numeric">
          <button class="km-btn" onclick="APP.updateKm()">עדכן</button>
        </div>
      </div>
      <div class="fault-card" id="fault-section">
        <div class="fault-label">דיווח תקלה</div>
        <textarea class="fault-textarea" id="fault-text" placeholder="תאר את התקלה..."></textarea>
        <button class="fault-btn" onclick="APP.reportFault()">
          <svg width="18" height="18"><use href="#ic-alert" color="white"/></svg>
          שלח דיווח
        </button>
      </div>
      <div style="height:100px"></div>
    </div>
  </div>

  <button class="fab" id="fab" onclick="APP.nav('service');setTimeout(()=>document.getElementById('fault-section').scrollIntoView({behavior:'smooth'}),100)">
    <svg width="18" height="18"><use href="#ic-plus" color="white"/></svg>
    דווח תקלה
  </button>

  <div class="bnav">
    <div class="bn-item" id="bn-history" onclick="APP.nav('history')">
      <svg class="bn-ic" width="22" height="22"><use href="#ic-clock"/></svg>
      <span class="bn-lbl">היסטוריה</span>
    </div>
    <div class="bn-item" id="bn-vehicle" onclick="APP.nav('vehicle')">
      <svg class="bn-ic" width="22" height="22"><use href="#ic-car"/></svg>
      <span class="bn-lbl">הרכב</span>
    </div>
    <div class="bn-item" id="bn-alerts" onclick="APP.nav('alerts')">
      <svg class="bn-ic" width="22" height="22"><use href="#ic-bell"/></svg>
      <span class="bn-lbl">התראות</span>
    </div>
    <div class="bn-item active" id="bn-home" onclick="APP.nav('home')">
      <svg class="bn-ic" width="22" height="22"><use href="#ic-home"/></svg>
      <span class="bn-lbl">ראשי</span>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
