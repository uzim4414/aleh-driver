name: Notify Deploy (Telegram)

# Fires ONLY after GitHub Pages actually finishes deploying — not on push.
# GitHub emits a deployment_status event with state=success when the CDN
# is live and the new files are truly reachable by users.
on:
  deployment_status:

# One notification per git SHA — GitHub Pages retries the same commit
# multiple times; keying on the deployed SHA prevents duplicate messages.
concurrency:
  group: notify-deploy-${{ github.event.deployment.sha }}
  cancel-in-progress: true

jobs:
  telegram:
    # Run only when Pages deployment succeeds (not on pending/in_progress/failure).
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'github-pages'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}
          fetch-depth: 1

      - name: Parse version.json
        id: ver
        run: |
          if [ ! -f version.json ]; then
            echo "version.json missing — skipping notification."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SW=$(jq -r '.swVersion // "unknown"' version.json)
          SHA=$(jq -r '.sha // "unknown"' version.json)
          # Human date from version.json; fallback to now.
          RAWDATE=$(jq -r '.date // ""' version.json)
          if [ -n "$RAWDATE" ]; then
            NICE=$(date -d "$RAWDATE" +'%d/%m/%Y %H:%M' 2>/dev/null || echo "$RAWDATE")
          else
            NICE=$(date +'%d/%m/%Y %H:%M')
          fi
          {
            echo "sw=$SW"
            echo "sha=$SHA"
            echo "nice=$NICE"
            echo "skip=false"
          } >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        if: steps.ver.outputs.skip == 'false'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SW: ${{ steps.ver.outputs.sw }}
          SHA: ${{ steps.ver.outputs.sha }}
          NICE: ${{ steps.ver.outputs.nice }}
          DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          FULL_SHA="${{ github.event.deployment.sha }}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${FULL_SHA}"
          PWA_URL="https://uzim4414.github.io/aleh-driver/"

          TEXT=$(printf '%s\n' \
            "🟢 *Fleet Driver PWA — Live on Pages*" \
            "━━━━━━━━━━━━━━━━━━━━" \
            "" \
            "📦 Version:  \`${SW}\`" \
            "🔗 SHA:  \`${SHA}\`" \
            "🕐 Date:  ${NICE}" \
            "" \
            "━━━━━━━━━━━━━━━━━━━━" \
            "✅ *הקבצים חיים — האפליקציה מוכנה לעדכון*" \
            "" \
            "[📱 פתח PWA](${PWA_URL})   ·   [🐙 Commit](${COMMIT_URL})")

          HTTP=$(curl -s -o /tmp/tg_resp.json -w '%{http_code}' \
            -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true")

          echo "Telegram HTTP status: $HTTP"
          cat /tmp/tg_resp.json || true
          if [ "$HTTP" != "200" ]; then
            echo "::error::Telegram notification failed (HTTP $HTTP)"
            exit 1
          fi
          echo "✅ Telegram sent — PWA ${SW} is live."
