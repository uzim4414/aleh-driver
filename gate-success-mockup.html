<title>Gate Success — Mockup v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:#000; font-family:-apple-system,'Segoe UI',sans-serif; color:#fff; overflow:hidden; direction:rtl; }

#gate-success-overlay {
  position:fixed; inset:0; z-index:100000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:32px;
  background:
    radial-gradient(110% 70% at 50% 42%, rgba(48,209,88,.18) 0%, rgba(48,209,88,.04) 38%, transparent 65%),
    linear-gradient(165deg,#03120a 0%,#061a0e 50%,#010805 100%);
  overflow:hidden;
  animation:landingIn .55s cubic-bezier(.22,1,.36,1) both;
}
@keyframes landingIn { 0%{opacity:0;transform:scale(.93)} 100%{opacity:1;transform:scale(1)} }

/* aurora glow */
#gate-success-overlay::before {
  content:''; position:absolute; left:50%; top:42%;
  width:520px; height:520px; transform:translate(-50%,-50%);
  background:radial-gradient(circle, rgba(48,209,88,.2) 0%, transparent 60%);
  filter:blur(30px); pointer-events:none;
  animation:aurora 4s ease-in-out infinite;
}
@keyframes aurora { 0%,100%{opacity:.45;transform:translate(-50%,-50%) scale(1)} 50%{opacity:.85;transform:translate(-50%,-50%) scale(1.15)} }

/* ── Close button ── */
.gs-close {
  position:absolute; top:20px; left:20px; z-index:10;
  width:36px; height:36px; border-radius:50%;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18);
  color:rgba(255,255,255,.75); font-size:18px; font-weight:300;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; line-height:1;
  opacity:0; animation:fadeIn .4s ease 1.6s forwards;
}
@keyframes fadeIn { to{opacity:1} }

/* ── Replay (mockup only) ── */
.replay {
  position:absolute; top:20px; right:20px; z-index:10;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.6); font-family:inherit; font-size:11px; font-weight:700;
  padding:6px 12px; border-radius:100px; cursor:pointer;
}

/* ── Icon + circular progress ── */
.gs-icon {
  position:relative; width:180px; height:180px; margin-bottom:30px;
  display:flex; align-items:center; justify-content:center;
  opacity:0; animation:rise .65s cubic-bezier(.22,1,.36,1) .05s both;
}
@keyframes rise { 0%{opacity:0;transform:translateY(18px) scale(.82)} 100%{opacity:1;transform:translateY(0) scale(1)} }

/* Sonar rings */
.ring {
  position:absolute; inset:0; border-radius:50%;
  border:1.5px solid rgba(48,209,88,.5);
  animation:sonar 2.8s cubic-bezier(0,0,.18,1) infinite;
}
.ring:nth-child(2){animation-delay:1s} .ring:nth-child(3){animation-delay:2s}
@keyframes sonar { 0%{transform:scale(.5);opacity:.75} 100%{transform:scale(2.1);opacity:0} }

/* Circular progress SVG — replaces bottom bar */
.gs-cprog {
  position:absolute; inset:-4px;
  transform:rotate(-90deg);
}
.gs-cprog .track { stroke:rgba(255,255,255,.07); }
.gs-cprog .prog {
  stroke:url(#progGrad); stroke-linecap:round;
  stroke-dasharray:502; stroke-dashoffset:502;
  filter:drop-shadow(0 0 6px rgba(48,209,88,.7));
  animation:progFill 4.5s cubic-bezier(.4,0,.2,1) .5s forwards;
}
@keyframes progFill { to{stroke-dashoffset:0} }

/* Glowing disc */
.gs-disc {
  position:relative; width:138px; height:138px; border-radius:50%;
  background:radial-gradient(circle at 50% 35%, rgba(48,209,88,.22), rgba(10,30,16,.9));
  border:1.5px solid rgba(48,209,88,.35);
  box-shadow:0 0 50px rgba(48,209,88,.4), inset 0 0 30px rgba(48,209,88,.12);
  display:flex; align-items:center; justify-content:center;
  animation:discPulse 2.2s ease-in-out .8s infinite;
}
@keyframes discPulse {
  0%,100%{box-shadow:0 0 46px rgba(48,209,88,.36),inset 0 0 28px rgba(48,209,88,.1)}
  50%    {box-shadow:0 0 70px rgba(48,209,88,.6), inset 0 0 36px rgba(48,209,88,.2)}
}

/* ── Gate SVG ── */
.gate-svg { width:90px; height:90px; overflow:visible; }

/* Ground + pillar */
.g-ground { opacity:.4; }
.g-pillar { }

/* Horizontal arm */
.g-arm {
  transform-box:fill-box;
  transform-origin:6px 50%;
  animation:armSwing 1.1s cubic-bezier(.34,1.56,.64,1) .5s both;
}
@keyframes armSwing { 0%{transform:rotate(0deg)} 100%{transform:rotate(-82deg)} }

/* Chevron on arm */
.g-chevron { animation:armSwing 1.1s cubic-bezier(.34,1.56,.64,1) .5s both; }

/* Light beam fan */
.g-beam {
  opacity:0;
  transform-box:fill-box; transform-origin:12px 62px;
  animation:beamIn 1.2s ease-out 1.4s both;
}
@keyframes beamIn { 0%{opacity:0;transform:scaleY(.1)} 30%{opacity:.55} 100%{opacity:.15;transform:scaleY(1)} }

/* Checkmark */
.g-check {
  stroke-dasharray:60; stroke-dashoffset:60;
  animation:drawCheck .55s ease-out 1.5s forwards;
}
@keyframes drawCheck { to{stroke-dashoffset:0} }

/* Check circle pop */
.g-check-circle {
  transform-box:fill-box; transform-origin:center;
  transform:scale(0); opacity:0;
  animation:circlePop .45s cubic-bezier(.34,1.56,.64,1) 1.48s forwards;
}
@keyframes circlePop { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }

/* ── Text ── */
.gs-title {
  font-size:34px; font-weight:800; color:#30D158; text-align:center;
  letter-spacing:-.5px; text-shadow:0 0 24px rgba(48,209,88,.5);
  opacity:0; animation:rise .55s cubic-bezier(.22,1,.36,1) .28s both;
}
.gs-lot {
  font-size:17px; font-weight:600; color:rgba(255,255,255,.8); margin-top:12px; text-align:center;
  opacity:0; animation:rise .55s cubic-bezier(.22,1,.36,1) .44s both;
}
.gs-meta {
  font-size:13px; color:rgba(255,255,255,.42); margin-top:6px; text-align:center;
  font-variant-numeric:tabular-nums;
  opacity:0; animation:rise .55s cubic-bezier(.22,1,.36,1) .58s both;
}
.gs-hint {
  position:absolute; bottom:36px; left:0; right:0; text-align:center;
  font-size:12px; font-weight:500; color:rgba(255,255,255,.28);
  opacity:0; animation:hintPulse 2.6s ease-in-out 1.8s infinite;
}
@keyframes hintPulse { 0%,100%{opacity:.18} 50%{opacity:.5} }
</style>

<div id="gate-success-overlay">
  <button class="gs-close" onclick="document.getElementById('gate-success-overlay').style.display='none'">✕</button>
  <button class="replay" onclick="playAnim()">↻</button>

  <div class="gs-icon" id="gs-icon">
    <span class="ring"></span><span class="ring"></span><span class="ring"></span>

    <!-- Circular progress ring -->
    <svg class="gs-cprog" viewBox="0 0 188 188">
      <defs>
        <linearGradient id="progGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#1F8A3D"/>
          <stop offset="60%" stop-color="#30D158"/>
          <stop offset="100%" stop-color="#7fff9e"/>
        </linearGradient>
      </defs>
      <circle class="track" cx="94" cy="94" r="80" fill="none" stroke-width="5"/>
      <circle class="prog"  cx="94" cy="94" r="80" fill="none" stroke-width="5"/>
    </svg>

    <div class="gs-disc">
      <!-- Impressive gate SVG -->
      <svg class="gate-svg" viewBox="0 0 90 90" fill="none">
        <defs>
          <linearGradient id="armGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"  stop-color="#2ecc71"/>
            <stop offset="40%" stop-color="#eafff0"/>
            <stop offset="100%" stop-color="#2ecc71"/>
          </linearGradient>
          <linearGradient id="pillarGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5eea86"/>
            <stop offset="100%" stop-color="#1a7a3a"/>
          </linearGradient>
          <radialGradient id="beamGrad" cx="0%" cy="100%" r="100%">
            <stop offset="0%"  stop-color="#30D158" stop-opacity=".7"/>
            <stop offset="100%" stop-color="#30D158" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- Ground shadow -->
        <ellipse class="g-ground" cx="45" cy="80" rx="32" ry="4" fill="#30D158"/>

        <!-- Pillar base -->
        <rect x="8" y="50" width="10" height="28" rx="3" fill="url(#pillarGrad)"/>
        <!-- Pillar cap -->
        <circle cx="13" cy="50" r="6" fill="#5eea86"/>
        <!-- Pillar light ring -->
        <circle cx="13" cy="50" r="6" fill="none" stroke="rgba(94,234,134,.6)" stroke-width="2"
          style="animation:sonar 2s ease-out 1.8s infinite"/>

        <!-- Light beam fan (before arm lifts) -->
        <polygon class="g-beam"
          points="13,62 13,50 75,20 75,50"
          fill="url(#beamGrad)"/>

        <!-- Arm group -->
        <g class="g-arm">
          <!-- Main arm bar -->
          <rect x="6" y="46" width="72" height="10" rx="5" fill="url(#armGrad)"/>
          <!-- Red stripes on arm -->
          <rect x="16" y="46" width="10" height="10" rx="2" fill="#FF453A" opacity=".85"/>
          <rect x="36" y="46" width="10" height="10" rx="2" fill="#FF453A" opacity=".85"/>
          <rect x="58" y="46" width="8"  height="10" rx="2" fill="#FF453A" opacity=".85"/>
          <!-- Arm tip glow -->
          <circle cx="77" cy="51" r="5" fill="#30D158" opacity=".8"
            style="filter:drop-shadow(0 0 6px #30D158)"/>
        </g>

        <!-- Check circle (appears after arm lifts) -->
        <circle class="g-check-circle" cx="56" cy="60" r="14"
          fill="rgba(48,209,88,.15)" stroke="#30D158" stroke-width="2"/>
        <!-- Checkmark -->
        <path class="g-check"
          d="M48 60 L54 67 L64 53"
          stroke="#30D158" stroke-width="3.5"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <div class="gs-title" id="gs-title">השער נפתח!</div>
  <div class="gs-lot"   id="gs-lot">שער עלה ראשי</div>
  <div class="gs-meta"  id="gs-meta">מרחק: 23מ׳ · 20:55</div>
  <div class="gs-hint">לחץ לסגירה</div>
</div>

<script>
function playAnim(){
  const ov  = document.getElementById('gate-success-overlay');
  ov.style.animation='none'; void ov.offsetWidth; ov.style.animation='';
  document.querySelectorAll(
    '#gs-icon,.gs-title,.gs-lot,.gs-meta,.gs-close,.g-arm,.g-check,.g-check-circle,.g-beam,.prog,.ring'
  ).forEach(el=>{ el.style.animation='none'; void el.offsetWidth; el.style.animation=''; });
}
requestAnimationFrame(()=>setTimeout(playAnim,80));
</script>
